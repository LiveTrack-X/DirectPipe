name: v4 macOS Build

on:
  push:
    branches: [v4]
  pull_request:
    branches: [v4]

jobs:
  build-macos:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DDIRECTPIPE_BUILD_RECEIVER=ON \
            -DDIRECTPIPE_BUILD_TESTS=ON \
            -DCMAKE_CXX_FLAGS="-Wno-deprecated-declarations -Wno-error=deprecated"

      - name: Build All
        run: cmake --build build --config Release -j$(sysctl -n hw.ncpu)

      - name: Run Tests
        run: cd build && ctest --output-on-failure

      - name: Upload DirectPipe.app
        uses: actions/upload-artifact@v4
        with:
          name: DirectPipe-macOS
          path: build/host/DirectPipe_artefacts/Release/DirectPipe.app
          if-no-files-found: error

      - name: Upload Receiver AU
        uses: actions/upload-artifact@v4
        with:
          name: DirectPipeReceiver-macOS-AU
          path: build/plugins/receiver/DirectPipeReceiver_artefacts/Release/AU/
          if-no-files-found: warn

      - name: Upload Receiver VST3
        uses: actions/upload-artifact@v4
        with:
          name: DirectPipeReceiver-macOS-VST3
          path: build/plugins/receiver/DirectPipeReceiver_artefacts/Release/VST3/
          if-no-files-found: warn
