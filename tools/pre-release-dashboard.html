<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>DirectPipe Pre-Release Dashboard</title>
<style>
:root{--bg:#1a1a2e;--card:#16213e;--accent:#0f3460;--green:#4ecca3;--red:#e74c3c;--yellow:#f1c40f;--orange:#e67e22;--text:#eee;--dim:#888}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;padding:16px 20px}
h1{text-align:center;margin-bottom:2px;font-size:1.4em}
.sub{text-align:center;color:var(--dim);margin-bottom:14px;font-size:.85em}
.plat-bar{display:flex;justify-content:center;gap:6px;margin-bottom:14px}
.plat-btn{padding:7px 22px;border:2px solid #444;border-radius:6px;cursor:pointer;font-size:.9em;font-weight:600;background:var(--card);color:var(--dim);transition:all .15s}
.plat-btn:hover{border-color:#888}
.plat-btn.active{border-color:var(--green);color:var(--green);background:rgba(78,204,163,.08)}
.plat-btn .emoji{margin-right:4px}
.bar{display:flex;justify-content:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.bar button{padding:8px 20px;border:none;border-radius:5px;cursor:pointer;font-size:.9em;font-weight:600}
#btnRun{background:var(--green);color:#111}#btnRun:hover{opacity:.85}
#btnExport{background:var(--accent);color:var(--text)}
#btnReset{background:#333;color:var(--text)}
.stats{display:flex;justify-content:center;gap:16px;margin-bottom:14px;font-size:1em;flex-wrap:wrap}
.st{padding:6px 14px;border-radius:5px;background:var(--card)}
.st.p{border-left:4px solid var(--green)}.st.f{border-left:4px solid var(--red)}.st.w{border-left:4px solid var(--dim)}
.sec{background:var(--card);border-radius:7px;padding:12px 14px;margin-bottom:12px}
.sec h2{font-size:1em;margin-bottom:8px;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.sec h2:hover{opacity:.8}
.badge{font-size:.7em;padding:1px 6px;border-radius:3px}
.ba{background:var(--green);color:#111}.bm{background:var(--orange);color:#111}
.cnt{font-size:.7em;color:var(--dim);margin-left:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:4px 6px;border-bottom:1px solid #333;color:var(--dim);font-size:.78em}
td{padding:4px 6px;border-bottom:1px solid #1a1a2e;font-size:.84em;vertical-align:middle}
td:first-child{width:24px;text-align:center;color:var(--dim);font-size:.75em}
td:last-child{width:60px;text-align:center}
.P{color:var(--green)}.F{color:var(--red)}.S{color:var(--yellow)}.W{color:var(--dim)}.R{color:var(--yellow);animation:pu 1s infinite}
@keyframes pu{50%{opacity:.4}}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--green)}
.log{background:#111;border-radius:5px;padding:10px;margin-top:10px;max-height:250px;overflow-y:auto;font-family:Consolas,monospace;font-size:.78em;white-space:pre-wrap;color:#aaa}
.le{}.le.e{color:var(--red)}.le.o{color:var(--green)}.le.i{color:#6c9bd2}
.ov{text-align:center;font-size:1.6em;font-weight:700;padding:14px;border-radius:7px;margin-top:14px}
.ov.p{background:rgba(78,204,163,.12);color:var(--green)}
.ov.f{background:rgba(231,76,60,.12);color:var(--red)}
.ov.w{background:var(--card);color:var(--dim)}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:960px){.cols{grid-template-columns:1fr}}
.collapsed table{display:none}
</style>
</head>
<body>
<h1>DirectPipe Pre-Release Dashboard</h1>
<p class="sub" id="connLabel">Connecting...</p>

<div class="plat-bar" id="platBar">
<button class="plat-btn active" onclick="setPlatform('win')"><span class="emoji">&#x1F5A5;</span>Windows</button>
<button class="plat-btn" onclick="setPlatform('mac')"><span class="emoji">&#xF8FF;</span>macOS</button>
<button class="plat-btn" onclick="setPlatform('linux')"><span class="emoji">&#x1F427;</span>Linux</button>
</div>

<div class="bar">
<button id="btnRun" onclick="runAll()">Run All Auto Tests</button>
<button id="btnExport" onclick="exportReport()">Export Report</button>
<button id="btnReset" onclick="resetAll()">Reset</button>
</div>
<div class="stats">
<div class="st w" id="sA">Auto: --</div>
<div class="st w" id="sM">Manual: --</div>
<div class="st w" id="sT">Total: --</div>
</div>
<div class="cols" id="content"></div>
<div class="sec"><h2>Test Log</h2><div class="log" id="logArea"></div></div>
<div class="ov w" id="ovr">Run tests to see result</div>

<script>
const API='http://127.0.0.1:8766';
const D=ms=>new Promise(r=>setTimeout(r,ms));
let R={};// results: id->'pass'|'fail'|'skip'|'pending'
let snap=null;// state snapshot for restore
let platform=localStorage.getItem('dp_platform')||'win';

// ════════════════════════════════════════════════════════
// PLATFORM HELPERS
// ════════════════════════════════════════════════════════
function setPlatform(p){
  platform=p;
  localStorage.setItem('dp_platform',p);
  document.querySelectorAll('.plat-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.plat-btn')[{win:0,mac:1,linux:2}[p]].classList.add('active');
  render();
}
// Check if a test applies to the current platform
function matchPlatform(t){
  if(!t.os)return true;
  if(typeof t.os==='string')return t.os===platform;
  return t.os.includes(platform);
}
// Get platform-specific test name
function getName(t){
  if(typeof t.name==='string')return t.name;
  return t.name[platform]||t.name.all||t.name.win||'';
}

async function api(p){try{const r=await fetch(API+p);return await r.json()}catch{return null}}
async function raw(p){try{return await fetch(API+p)}catch{return{status:0}}}
// Poll state until condition is met (max 5s, 200ms interval)
async function waitFor(condFn,timeout=5000){const t0=Date.now();while(Date.now()-t0<timeout){const s=await st();if(s&&condFn(s))return s;await D(200)}return null}
// Unwrap /api/status → returns data object with normalized fields
async function st(){
  const r=await api('/api/status');if(!r||!r.data)return null;
  const d=r.data;
  d.input_gain=d.volumes?d.volumes.input:0;
  d.monitor_volume=d.volumes?d.volumes.monitor:0;
  if(d.plugins)d.plugins=d.plugins.map(p=>({...p,bypassed:p.bypass??p.bypassed,loaded:p.loaded??true}));
  return d;
}

// ════════════════════════════════════════════════════════
// TEST DEFINITIONS
// os: 'win'|'mac'|'linux' or ['win','mac'] — omit for all
// name: string or {win:'...',mac:'...',linux:'...',all:'...'}
// ════════════════════════════════════════════════════════
const sections=[

// ──── 1. API Connection & State ────
{title:'1. API Connection & State',col:0,tests:[
{id:'a_api_reach',name:'API reachable (GET /api)',type:'auto',fn:async()=>{const r=await api('/api');return r&&r.info}},
{id:'a_status_json',name:'Status returns valid JSON',type:'auto',fn:async()=>{const s=await st();return s&&typeof s.muted==='boolean'}},
{id:'a_cors',name:'CORS enabled (cross-origin fetch succeeds)',type:'auto',fn:async()=>{try{const r=await fetch(API+'/api',{mode:'cors'});return r.ok}catch{return false}}},
{id:'a_state_muted',name:'State: muted (bool)',type:'auto',fn:async()=>{const s=await st();return s&&typeof s.muted==='boolean'}},
{id:'a_state_out_muted',name:'State: output_muted (bool)',type:'auto',fn:async()=>{const s=await st();return s&&typeof s.output_muted==='boolean'}},
{id:'a_state_in_muted',name:'State: input_muted (bool)',type:'auto',fn:async()=>{const s=await st();return s&&typeof s.input_muted==='boolean'}},
{id:'a_state_mon',name:'State: monitor_enabled (bool)',type:'auto',fn:async()=>{const s=await st();return s&&typeof s.monitor_enabled==='boolean'}},
{id:'a_state_igain',name:'State: input_gain (number)',type:'auto',fn:async()=>{const s=await st();return s&&typeof s.input_gain==='number'}},
{id:'a_state_mvol',name:'State: monitor_volume (number)',type:'auto',fn:async()=>{const s=await st();return s&&typeof s.monitor_volume==='number'}},
{id:'a_state_slot',name:'State: active_slot (0-4)',type:'auto',fn:async()=>{const s=await st();return s&&s.active_slot>=0&&s.active_slot<=4}},
{id:'a_state_rec',name:'State: recording (bool)',type:'auto',fn:async()=>{const s=await st();return s&&typeof s.recording==='boolean'}},
{id:'a_state_ipc',name:'State: ipc_enabled (bool)',type:'auto',fn:async()=>{const s=await st();return s&&typeof s.ipc_enabled==='boolean'}},
{id:'a_state_dlost',name:'State: device_lost (bool)',type:'auto',fn:async()=>{const s=await st();return s&&typeof s.device_lost==='boolean'}},
{id:'a_state_mlost',name:'State: monitor_lost (bool)',type:'auto',fn:async()=>{const s=await st();return s&&typeof s.monitor_lost==='boolean'}},
{id:'a_state_sr',name:'State: sample_rate (number > 0)',type:'auto',fn:async()=>{const s=await st();return s&&s.sample_rate>0}},
{id:'a_state_bs',name:'State: buffer_size (number > 0)',type:'auto',fn:async()=>{const s=await st();return s&&s.buffer_size>0}},
{id:'a_state_cpu',name:'State: cpu_percent (number >= 0)',type:'auto',fn:async()=>{const s=await st();return s&&typeof s.cpu_percent==='number'&&s.cpu_percent>=0}},
{id:'a_state_lat',name:'State: latency_ms (number >= 0)',type:'auto',fn:async()=>{const s=await st();return s&&typeof s.latency_ms==='number'&&s.latency_ms>=0}},
{id:'a_state_plugins',name:'State: plugins (array)',type:'auto',fn:async()=>{const s=await st();return s&&Array.isArray(s.plugins)}},
{id:'a_state_slotnames',name:'State: slot_names (array[5])',type:'auto',fn:async()=>{const s=await st();return s&&Array.isArray(s.slot_names)&&s.slot_names.length===5}},
{id:'a_state_bypass',name:'State: master_bypassed (bool)',type:'auto',fn:async()=>{const s=await st();return s&&typeof s.master_bypassed==='boolean'}},
]},

// ──── 2. Volume & Gain ────
{title:'2. Volume & Gain Control',col:0,tests:[
{id:'a_vol_mon_set',name:'Set monitor volume 0.5',type:'auto',fn:async()=>{await api('/api/volume/monitor/0.5');await D(300);const s=await st();return s&&Math.abs(s.monitor_volume-0.5)<0.05}},
{id:'a_vol_mon_0',name:'Set monitor volume 0.0',type:'auto',fn:async()=>{await api('/api/volume/monitor/0.0');await D(300);const s=await st();return s&&s.monitor_volume<0.05}},
{id:'a_vol_mon_1',name:'Set monitor volume 1.0',type:'auto',fn:async()=>{await api('/api/volume/monitor/1.0');await D(300);const s=await st();return s&&s.monitor_volume>0.95}},
{id:'a_vol_mon_reject',name:'Reject monitor volume > 1.0 (400)',type:'auto',fn:async()=>{const r=await raw('/api/volume/monitor/1.5');return r.status===400}},
{id:'a_vol_in_set',name:'Set input gain 1.0',type:'auto',fn:async()=>{await api('/api/volume/input/1.0');await D(300);const s=await st();return s&&Math.abs(s.input_gain-1.0)<0.05}},
{id:'a_vol_in_2x',name:'Input gain accepts 2.0 (200)',type:'auto',fn:async()=>{const r=await raw('/api/volume/input/2.0');return r.status===200}},
{id:'a_vol_in_reject',name:'Reject input gain > 2.0 (400)',type:'auto',fn:async()=>{const r=await raw('/api/volume/input/2.5');return r.status===400}},
{id:'a_gain_adj_up',name:'Gain adjust +0.1',type:'auto',fn:async()=>{await api('/api/volume/input/1.0');await D(200);await api('/api/gain/0.1');await D(300);const s=await st();return s&&s.input_gain>1.0}},
{id:'a_gain_adj_dn',name:'Gain adjust -0.1',type:'auto',fn:async()=>{await api('/api/volume/input/1.0');await D(200);await api('/api/gain/-0.1');await D(300);const s=await st();return s&&s.input_gain<1.0}},
{id:'a_gain_clamp_hi',name:'Gain adjust clamps at 2.0',type:'auto',fn:async()=>{await api('/api/volume/input/1.9');await D(200);await api('/api/gain/0.5');await D(300);const s=await st();return s&&s.input_gain<=2.01}},
{id:'a_gain_clamp_lo',name:'Gain adjust clamps at 0.0',type:'auto',fn:async()=>{await api('/api/volume/input/0.1');await D(200);await api('/api/gain/-0.5');await D(300);const s=await st();return s&&s.input_gain>=0.0}},
]},

// ──── 3. Mute & Panic ────
{title:'3. Mute & Panic',col:0,tests:[
{id:'a_mute_toggle',name:'Toggle global mute',type:'auto',fn:async()=>{const s0=await st();if(!s0)return false;await api('/api/mute/toggle');await D(500);const s1=await st();await api('/api/mute/toggle');await D(500);return s1&&s1.muted!==s0.muted}},
{id:'a_mute_in_toggle',name:'Toggle input mute',type:'auto',fn:async()=>{const s0=await st();if(!s0)return false;await api('/api/input-mute/toggle');await D(800);const s1=await st();await api('/api/input-mute/toggle');await D(500);return s1&&s1.input_muted!==s0.input_muted}},
{id:'a_panic_on',name:'Panic mute → muted=true',type:'auto',fn:async()=>{const s0=await st();if(!s0)return false;if(s0.muted){await api('/api/mute/toggle');await D(500)}await api('/api/mute/panic');await D(500);const s1=await st();await api('/api/mute/panic');await D(500);return s1&&s1.muted===true}},
{id:'a_panic_lock',name:'During panic: volume change blocked',type:'auto',fn:async()=>{const s0=await st();if(!s0)return false;const wasMuted=s0.muted;if(!wasMuted){await api('/api/mute/panic');await D(500)}const before=await st();const bvol=before?before.monitor_volume:0;await api('/api/volume/monitor/0.1');await D(500);const after=await st();if(!wasMuted){await api('/api/mute/panic');await D(500)}return after&&Math.abs(after.monitor_volume-bvol)<0.05}},
{id:'a_panic_restore',name:'Panic off → previous state restored',type:'auto',fn:async()=>{const s0=await st();if(!s0)return false;const wasMuted=s0.muted;if(!wasMuted){await api('/api/mute/panic');await D(500);await api('/api/mute/panic');await D(500);const s1=await st();return s1&&s1.muted===false}return'skip'}},
]},

// ──── 4. Preset Slots ────
{title:'4. Preset Slots',col:0,tests:[
{id:'a_slot_b',name:'Switch to slot B (1)',type:'auto',fn:async()=>{await api('/api/slot/1');const s=await waitFor(s=>s.active_slot===1);return!!s}},
{id:'a_slot_c',name:'Switch to slot C (2)',type:'auto',fn:async()=>{await api('/api/slot/2');const s=await waitFor(s=>s.active_slot===2);return!!s}},
{id:'a_slot_a',name:'Switch back to slot A (0)',type:'auto',fn:async()=>{await api('/api/slot/0');const s=await waitFor(s=>s.active_slot===0);return!!s}},
{id:'a_slot_d',name:'Switch to slot D (3)',type:'auto',fn:async()=>{await api('/api/slot/3');const s=await waitFor(s=>s.active_slot===3);if(!s)return false;await api('/api/slot/0');return true}},
{id:'a_slot_e',name:'Switch to slot E (4)',type:'auto',fn:async()=>{await api('/api/slot/4');const s=await waitFor(s=>s.active_slot===4);if(!s)return false;await api('/api/slot/0');await waitFor(s=>s.active_slot===0);return true}},
{id:'a_slot_reject5',name:'Reject slot index 5 (400)',type:'auto',fn:async()=>{const r=await raw('/api/slot/5');return r.status===400}},
{id:'a_slot_reject_neg',name:'Reject slot index -1 (400)',type:'auto',fn:async()=>{const r=await raw('/api/slot/-1');return r.status===400}},
{id:'a_slot_names',name:'slot_names array has 5 entries',type:'auto',fn:async()=>{const s=await st();return s&&Array.isArray(s.slot_names)&&s.slot_names.length===5}},
]},

// ──── 5. Plugin Bypass ────
{title:'5. Plugin Bypass',col:0,tests:[
{id:'a_plug_list',name:'plugins array present',type:'auto',fn:async()=>{const s=await st();return s&&Array.isArray(s.plugins)}},
{id:'a_plug_bypass0',name:'Toggle plugin 0 bypass',type:'auto',fn:async()=>{const s=await st();if(!s||!s.plugins||s.plugins.length===0)return'skip';const b=s.plugins[0].bypassed;await api('/api/bypass/0/toggle');await D(300);const s1=await st();await api('/api/bypass/0/toggle');return s1&&s1.plugins[0].bypassed!==b}},
{id:'a_plug_master',name:'Toggle master bypass',type:'auto',fn:async()=>{const s0=await st();if(!s0)return false;await api('/api/bypass/master');await D(300);const s1=await st();await api('/api/bypass/master');return s1&&s1.master_bypassed!==s0.master_bypassed}},
{id:'a_plug_bad_idx',name:'Reject bypass index "abc" (400)',type:'auto',fn:async()=>{const r=await raw('/api/bypass/abc/toggle');return r.status===400}},
]},

// ──── 6. Toggle Actions ────
{title:'6. Toggle Actions (IPC/Monitor/Recording)',col:0,tests:[
{id:'a_ipc_toggle',name:'IPC toggle',type:'auto',fn:async()=>{const s0=await st();if(!s0)return false;await api('/api/ipc/toggle');await D(600);const s1=await st();await api('/api/ipc/toggle');await D(300);return s1&&s1.ipc_enabled!==s0.ipc_enabled}},
{id:'a_mon_toggle',name:'Monitor toggle',type:'auto',fn:async()=>{const s0=await st();if(!s0)return false;await api('/api/monitor/toggle');await D(800);const s1=await st();await api('/api/monitor/toggle');await D(500);return s1&&s1.monitor_enabled!==s0.monitor_enabled}},
{id:'a_rec_toggle',name:'Recording toggle → recording=true',type:'auto',fn:async()=>{const s0=await st();if(!s0)return false;if(s0.recording){await api('/api/recording/toggle');await D(500)}await api('/api/recording/toggle');await D(800);const s1=await st();await api('/api/recording/toggle');await D(300);return s1&&s1.recording===true}},
{id:'a_rec_seconds',name:'Recording shows seconds > 0',type:'auto',fn:async()=>{const s0=await st();if(!s0)return false;const wasRec=s0.recording;if(!wasRec){await api('/api/recording/toggle');await D(2000)}const s=await st();if(!wasRec){await api('/api/recording/toggle');await D(300)}return s&&s.recording_seconds>0}},
]},

// ──── 7. Extended State & API Coverage ────
{title:'7. Extended State & API',col:0,tests:[
{id:'a_ext_chmode',name:'State: channel_mode (1 or 2)',type:'auto',fn:async()=>{const s=await st();return s&&(s.channel_mode===1||s.channel_mode===2)}},
{id:'a_ext_latency',name:'State: latency_ms (number >= 0)',type:'auto',fn:async()=>{const s=await st();return s&&typeof s.latency_ms==='number'&&s.latency_ms>=0}},
{id:'a_ext_cpu',name:'State: cpu_percent (number >= 0)',type:'auto',fn:async()=>{const s=await st();return s&&typeof s.cpu_percent==='number'&&s.cpu_percent>=0}},
{id:'a_ext_preset',name:'State: preset (string)',type:'auto',fn:async()=>{const s=await st();return s&&typeof s.preset==='string'}},
{id:'a_ext_level',name:'State: level_db (number)',type:'auto',fn:async()=>{const s=await st();return s&&typeof s.level_db==='number'}},
{id:'a_ext_master_bp',name:'State: master_bypassed (bool)',type:'auto',fn:async()=>{const s=await st();return s&&typeof s.master_bypassed==='boolean'}},
{id:'a_param_set',name:'Set plugin param → 200 OK',type:'auto',fn:async()=>{const s=await st();if(!s||!s.plugins||s.plugins.length===0)return'skip';const r=await raw('/api/plugin/0/param/0/0.5');return r.status===200}},
{id:'a_param_bad_val',name:'Plugin param > 1.0 → 400',type:'auto',fn:async()=>{const r=await raw('/api/plugin/0/param/0/1.5');return r.status===400}},
{id:'a_midi_cc_inject',name:'MIDI CC inject → 200 OK',type:'auto',fn:async()=>{const r=await raw('/api/midi/cc/1/0/64');return r.status===200}},
{id:'a_midi_note_inject',name:'MIDI Note inject → 200 OK',type:'auto',fn:async()=>{const r=await raw('/api/midi/note/1/60/127');return r.status===200}},
{id:'a_midi_bad_ch',name:'MIDI channel 0 → 400',type:'auto',fn:async()=>{const r=await raw('/api/midi/cc/0/0/64');return r.status===400}},
{id:'a_midi_bad_val',name:'MIDI value 200 → 400',type:'auto',fn:async()=>{const r=await raw('/api/midi/cc/1/0/200');return r.status===400}},
{id:'a_slot_round',name:'Slot A→B→A round-trip → plugins restored',type:'auto',fn:async()=>{const s0=await st();if(!s0||!s0.plugins)return'skip';const names0=s0.plugins.map(p=>p.name).join(',');await api('/api/slot/1');await waitFor(s=>s.active_slot===1);await api('/api/slot/0');const s1=await waitFor(s=>s.active_slot===0);if(!s1||!s1.plugins)return false;return s1.plugins.map(p=>p.name).join(',')===names0}},
]},

// ──── 8. API Error Handling ────
{title:'8. API Error Handling',col:0,tests:[
{id:'a_err_404',name:'Unknown endpoint → 404',type:'auto',fn:async()=>{const r=await raw('/api/nonexistent');return r.status===404}},
{id:'a_err_405',name:'POST → 405 (method not allowed)',type:'auto',fn:async()=>{try{const r=await fetch(API+'/api/status',{method:'POST'});return r.status===405}catch{return false}}},
{id:'a_err_bad_bypass',name:'Invalid bypass index → 400',type:'auto',fn:async()=>{const r=await raw('/api/bypass/abc/toggle');return r.status===400}},
{id:'a_err_bad_slot',name:'Slot out of range → 400',type:'auto',fn:async()=>{const r=await raw('/api/slot/99');return r.status===400}},
{id:'a_err_bad_vol_target',name:'Bad volume target → 400',type:'auto',fn:async()=>{const r=await raw('/api/volume/bad/0.5');return r.status===400}},
{id:'a_err_vol_range',name:'Volume out of range → 400',type:'auto',fn:async()=>{const r=await raw('/api/volume/monitor/-0.5');return r.status===400}},
]},

// ──── 9. App Startup / Tray ────

// ════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════
function render(){
  // Update platform buttons
  document.querySelectorAll('.plat-btn').forEach((b,i)=>{
    b.classList.toggle('active',['win','mac','linux'][i]===platform);
  });
  const el=document.getElementById('content');
  el.innerHTML='<div id="col0"></div><div id="col1"></div>';
  for(const sec of sections){
    const visTests=sec.tests.filter(matchPlatform);
    if(visTests.length===0)continue;
    const at=visTests.filter(t=>t.type==='auto').length;
    const mt=visTests.filter(t=>t.type==='manual').length;
    const badge=at>0?'<span class="badge ba">AUTO '+at+'</span>':'';
    const mbadge=mt>0?'<span class="badge bm">MANUAL '+mt+'</span>':'';
    const total=visTests.length;
    const done=visTests.filter(t=>R[t.id]==='pass').length;
    let h='<div class="sec" id="sec_'+visTests[0].id+'"><h2 onclick="toggleSec(this)">'+sec.title+' '+badge+mbadge+'<span class="cnt">'+done+'/'+total+'</span></h2><table>';
    h+='<tr><th>#</th><th>Test</th><th>Result</th></tr>';
    for(let i=0;i<visTests.length;i++){
      const t=visTests[i];
      R[t.id]=R[t.id]||'pending';
      const tname=getName(t);
      if(t.type==='auto'){
        h+='<tr><td>'+(i+1)+'</td><td>'+tname+'</td><td id="ic_'+t.id+'">'+ico(R[t.id])+'</td></tr>';
      }else{
        const ck=R[t.id]==='pass'?'checked':'';
        h+='<tr><td>'+(i+1)+'</td><td>'+tname+'</td><td><input type=checkbox '+ck+' onchange="mc(\''+t.id+'\',this.checked)"></td></tr>';
      }
    }
    h+='</table></div>';
    document.getElementById('col'+sec.col).innerHTML+=h;
  }
  updateStats();
}

function ico(s){
  const m={pass:'<span class="P">PASS</span>',fail:'<span class="F">FAIL</span>',skip:'<span class="S">SKIP</span>',pending:'<span class="W">--</span>',running:'<span class="R">...</span>'};
  return m[s]||m.pending;
}
function setIco(id,s){const e=document.getElementById('ic_'+id);if(e)e.innerHTML=ico(s);R[id]=s;updateStats();save();}
function mc(id,ck){R[id]=ck?'pass':'pending';updateStats();save();render();}
function toggleSec(h2){h2.parentElement.classList.toggle('collapsed');}

function getVisibleTests(){
  const vis=[];
  for(const sec of sections)for(const t of sec.tests)if(matchPlatform(t))vis.push(t);
  return vis;
}

function updateStats(){
  const vis=getVisibleTests();
  let ap=0,af=0,at=0,mp=0,mt=0;
  for(const t of vis){
    if(t.type==='auto'){at++;if(R[t.id]==='pass')ap++;if(R[t.id]==='fail')af++;}
    else{mt++;if(R[t.id]==='pass')mp++;}
  }
  const ae=document.getElementById('sA');ae.textContent='Auto: '+ap+'/'+at+(af?' ('+af+' fail)':'');ae.className='st '+(af?'f':ap===at?'p':'w');
  const me=document.getElementById('sM');me.textContent='Manual: '+mp+'/'+mt;me.className='st '+(mp===mt?'p':'w');
  const tot=ap+mp,all=at+mt;
  const te=document.getElementById('sT');te.textContent='Total: '+tot+'/'+all;te.className='st '+(af?'f':tot===all?'p':'w');
  const ov=document.getElementById('ovr');
  if(af>0){ov.textContent='FAIL - '+af+' auto test(s) failed';ov.className='ov f';}
  else if(tot===all){ov.textContent='READY TO RELEASE';ov.className='ov p';}
  else{ov.textContent=(all-tot)+' items remaining';ov.className='ov w';}
  // update section counts
  for(const sec of sections){
    const visTests=sec.tests.filter(matchPlatform);
    if(visTests.length===0)continue;
    const sid='sec_'+visTests[0].id;const el=document.getElementById(sid);
    if(el){const cnt=el.querySelector('.cnt');if(cnt){const d=visTests.filter(t=>R[t.id]==='pass').length;cnt.textContent=d+'/'+visTests.length;}}
  }
}

// ════════════════════════════════════════════════════════
// RUN
// ════════════════════════════════════════════════════════
async function runAll(){
  document.getElementById('btnRun').disabled=true;document.getElementById('btnRun').textContent='Running...';
  log('Starting auto tests... (platform: '+platform+')','i');
  snap=await st();
  if(!snap){log('ERROR: Cannot connect to '+API,'e');document.getElementById('btnRun').disabled=false;document.getElementById('btnRun').textContent='Run All Auto Tests';return;}
  log('Connected (SR='+snap.sample_rate+' BS='+snap.buffer_size+' Slot='+snap.active_slot+')','i');
  for(const sec of sections){
    for(const t of sec.tests){
      if(t.type!=='auto')continue;
      if(!matchPlatform(t))continue;
      setIco(t.id,'running');
      try{
        const r=await t.fn();
        if(r==='skip'){setIco(t.id,'skip');log('SKIP  '+getName(t),'i');}
        else if(r){setIco(t.id,'pass');log('PASS  '+getName(t),'o');}
        else{setIco(t.id,'fail');log('FAIL  '+getName(t),'e');}
      }catch(e){setIco(t.id,'fail');log('FAIL  '+getName(t)+': '+e.message,'e');}
    }
  }
  // restore
  if(snap){
    log('Restoring state...','i');
    try{
      await api('/api/volume/monitor/'+snap.monitor_volume);await D(200);
      await api('/api/volume/input/'+snap.input_gain);await D(200);
      const cur=await st();
      if(cur){
        if(cur.recording&&!snap.recording){await api('/api/recording/toggle');await D(500);}
        if(cur.muted&&!snap.muted){await api('/api/mute/panic');await D(500);
          const c2=await st();if(c2&&c2.muted){await api('/api/mute/toggle');await D(300);}
        }
        if(!cur.muted&&snap.muted){await api('/api/mute/toggle');await D(300);}
        if(cur.input_muted!==snap.input_muted){await api('/api/input-mute/toggle');await D(500);}
        if(cur.output_muted!==snap.output_muted){await api('/api/output-mute/toggle');await D(300);}
        if(cur.monitor_enabled!==snap.monitor_enabled){await api('/api/monitor/toggle');await D(500);}
        if(cur.ipc_enabled!==snap.ipc_enabled){await api('/api/ipc/toggle');await D(500);}
        if(cur.master_bypassed!==snap.master_bypassed){await api('/api/bypass/master');await D(300);}
      }
      if(snap.active_slot!==undefined){await api('/api/slot/'+snap.active_slot);await D(1200);}
      const afterSlot=await st();
      if(afterSlot&&afterSlot.plugins&&snap.plugins){
        for(let i=0;i<snap.plugins.length&&i<afterSlot.plugins.length;i++){
          if(afterSlot.plugins[i].bypassed!==snap.plugins[i].bypassed){
            await api('/api/bypass/'+i+'/toggle');await D(300);
            log('Restored plugin '+i+' ('+snap.plugins[i].name+') bypass='+snap.plugins[i].bypassed,'i');
          }
        }
      }
      const fin=await st();
      if(fin){
        const diffs=[];
        if(fin.muted!==snap.muted)diffs.push('muted');
        if(fin.input_muted!==snap.input_muted)diffs.push('input_muted');
        if(fin.monitor_enabled!==snap.monitor_enabled)diffs.push('monitor');
        if(fin.ipc_enabled!==snap.ipc_enabled)diffs.push('ipc');
        if(Math.abs(fin.monitor_volume-snap.monitor_volume)>0.05)diffs.push('mon_vol');
        if(Math.abs(fin.input_gain-snap.input_gain)>0.05)diffs.push('in_gain');
        if(fin.active_slot!==snap.active_slot)diffs.push('slot');
        if(fin.plugins&&snap.plugins){for(let i=0;i<snap.plugins.length&&i<fin.plugins.length;i++){
          if(fin.plugins[i].bypassed!==snap.plugins[i].bypassed)diffs.push('plugin'+i+'_bypass');
        }}
        if(diffs.length)log('WARN: Restore incomplete: '+diffs.join(', '),'e');
        else log('State fully restored.','o');
      }
    }catch(e){log('Restore error: '+e.message,'e');}
  }
  log('Done.','i');
  document.getElementById('btnRun').disabled=false;document.getElementById('btnRun').textContent='Run All Auto Tests';
}

function log(m,c){const e=document.getElementById('logArea');const t=new Date().toLocaleTimeString();e.innerHTML+='<div class="le '+c+'">['+t+'] '+m+'</div>';e.scrollTop=e.scrollHeight;}

// ════════════════════════════════════════════════════════
// EXPORT / RESET / PERSIST
// ════════════════════════════════════════════════════════
function exportReport(){
  const vis=getVisibleTests();
  const rpt={timestamp:new Date().toISOString(),platform:platform,results:R,log:document.getElementById('logArea').innerText,
    summary:{auto_pass:0,auto_fail:0,auto_total:0,manual_pass:0,manual_total:0}};
  for(const t of vis){
    if(t.type==='auto'){rpt.summary.auto_total++;if(R[t.id]==='pass')rpt.summary.auto_pass++;if(R[t.id]==='fail')rpt.summary.auto_fail++;}
    else{rpt.summary.manual_total++;if(R[t.id]==='pass')rpt.summary.manual_pass++;}
  }
  const b=new Blob([JSON.stringify(rpt,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='pre-release-report-'+platform+'-'+new Date().toISOString().slice(0,10)+'.json';a.click();
}
function resetAll(){if(!confirm('Reset all results for '+platform+'?'))return;R={};localStorage.removeItem('dp_test');render();log('Reset.','i');}
function save(){localStorage.setItem('dp_test',JSON.stringify(R));}
function load(){try{const s=localStorage.getItem('dp_test');if(s)R=JSON.parse(s);}catch{}}

// ════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════
async function init(){
  load();render();
  const s=await st();
  document.getElementById('connLabel').textContent=s
    ?'DirectPipe connected (SR='+s.sample_rate+' BS='+s.buffer_size+' Slot='+['A','B','C','D','E'][s.active_slot]+')'
    :'DirectPipe not detected - start the app and refresh';
}
init();
</script>
